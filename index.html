<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Постапокалиптический экшен-RPG с элементами симулятора выживания, визуальной новеллы и рейсинга.">
    <title>Хранитель Семени: The Last Ota</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap"
        rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="game-container">
        <!-- Main Menu -->
        <div id="main-menu" class="screen active">
            <div class="glitch-wrapper">
                <h1 class="glitch" data-text="ХРАНИТЕЛЬ СЕМЕНИ">ХРАНИТЕЛЬ СЕМЕНИ</h1>
            </div>
            <h2 class="subtitle">THE LAST Y-CHROMOSOME</h2>

            <div class="menu-options">
                <button id="btn-start" class="neon-btn">НАЧАТЬ ИГРУ</button>
                <button id="btn-load" class="neon-btn">ЗАГРУЗИТЬ</button>
                <button id="btn-settings" class="neon-btn">НАСТРОЙКИ</button>
            </div>

            <div class="character-bg silhouette-ota"></div>
        </div>

        <!-- Visual Novel Screen -->
        <div id="vn-screen" class="screen">
            <div id="vn-background" class="bg-transition"></div>

            <div id="character-sprite" class="sprite-transition"></div>

            <div id="dialogue-box" class="glass-panel">
                <div id="speaker-name">Такаши "Ота"</div>
                <div id="dialogue-text">...</div>
            </div>

            <div id="choices-container"></div>
        </div>

        <!-- Racing Screen -->
        <div id="racing-screen" class="screen">
            <canvas id="racing-canvas"></canvas>
            <div class="hud glass-panel">
                <div class="speed">SPEED <br><span id="speed-val">0</span> <span class="kmh">KM/H</span></div>
                <div class="boost">
                    <span>BOOST</span>
                    <div class="boost-bar">
                        <div id="boost-fill"></div>
                    </div>
                </div>
            </div>
            <div class="racing-qte" id="racing-msg">PRESS [SPACE] TO DRIFT!</div>
        </div>

        <!-- Combat Screen -->
        <div id="combat-screen" class="screen">
            <div class="combat-background"></div>

            <div class="combat-hud">
                <div class="player-stats glass-panel">
                    <div class="name">Такаши "Ота"</div>
                    <div class="hp-bar">
                        <div class="fill" style="width: 100%;"></div>
                    </div>
                    <div class="sp-bar">
                        <div class="fill" style="width: 100%;"></div>
                    </div>
                </div>

                <div class="combat-log glass-panel" id="combat-log">
                    Битва начинается!
                </div>

                <div class="enemy-stats glass-panel">
                    <div class="name">Ненавидящая Рейдерша</div>
                    <div class="enemy-hp-bar">
                        <div class="fill" style="width: 100%;"></div>
                    </div>
                </div>
            </div>

            <div class="combat-scene">
                <div class="player-sprite">
                    <img id="player-img" src="sprite_ota.png" width="300" alt="Player">
                </div>
                <!-- Enemy Sprite -->
                <div class="enemy-sprite">
                    <img id="enemy-img" src="sprite_raider.png" width="300" alt="Enemy">
                </div>
            </div>

            <div class="combat-menu">
                <button class="combat-btn attack" id="btn-attack">ОТАКУ-ПАНЧ</button>
                <button class="combat-btn skill" id="btn-skill">Sharingan-взгляд (SP: 20)</button>
                <button class="combat-btn talk" id="btn-talk">Соблазнение / Убеждение</button>
                <button class="combat-btn item" id="btn-item">Выпить энергетик</button>
            </div>
        </div>

        <!-- Global UI Elements -->
        <button id="btn-music" class="neon-btn small-btn global-top-btn" style="right: 180px;">🎵</button>
        <button id="btn-inventory" class="neon-btn small-btn global-top-btn" style="right: 20px;">🎒 Инвентарь</button>

        <div id="inventory-modal" class="glass-panel">
            <h2 class="inventory-title">🎒 ИНВЕНТАРЬ</h2>
            <div id="inventory-list" class="inventory-grid">
                <!-- Items will be injected here -->
            </div>
            <button id="btn-close-inventory" class="neon-btn small-btn btn-modal-close">ЗАКРЫТЬ</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/story.js"></script>
    <script src="js/game.js"></script>
</body>

</html>
